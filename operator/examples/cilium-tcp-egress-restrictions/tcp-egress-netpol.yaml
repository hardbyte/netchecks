apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: restrict-tcp-egress
spec:
  endpointSelector: {}
  egress:
    # Allow DNS to kube-dns (required for name resolution)
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    # Allow TCP to the Kubernetes API server.
    #
    # We use the `kube-apiserver` reserved entity rather than `toServices` —
    # `toServices` translates a ClusterIP Service into its backend identity
    # for policy matching, but its behavior changed in Cilium 1.17 and the
    # rule stopped matching reliably when kube-proxy is installed.
    #
    # We also intentionally do NOT pin a port: with kube-proxy the destination
    # port is rewritten by DNAT before Cilium's bpf policy hook sees the
    # packet (e.g. Service :443 → apiserver pod :6443 in kind), so a port
    # filter would have to know the apiserver's internal port. Restricting
    # to the `kube-apiserver` entity is already a tight match — there's only
    # one such workload per cluster.
    - toEntities:
        - kube-apiserver
