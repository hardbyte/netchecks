apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "netchecks.fullname" . }}
rules:
  # Events: posting events about reconciliation progress
  - apiGroups: [""]
    resources: [events]
    verbs: [create]

  # NetworkAssertions: watch and reconcile across all namespaces
  - apiGroups: [netchecks.io]
    resources: [networkassertions]
    verbs: [list, get, watch, patch, update]
  - apiGroups: [netchecks.io]
    resources: [networkassertions/status]
    verbs: [patch, update]

  # PolicyReports: create and update from probe results
  - apiGroups: [wgpolicyk8s.io]
    resources: [policyreports]
    verbs: [list, get, patch, create, update, watch]

  # Jobs and CronJobs: create probe workloads
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [create, list, get, update, delete, watch]

  # ConfigMaps: store probe configuration
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [list, get, patch, create, update, delete]

  # Pods: read probe pod status and logs
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get, list]
