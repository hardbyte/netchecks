apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netchecks.fullname" . }}
  labels:
    {{- include "netchecks.labels" . | nindent 4 }}
spec:
  # Only one replica is required for the operator
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "netchecks.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.operator.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "netchecks.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.operator.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "netchecks.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.operator.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.operator.securityContext | nindent 12 }}
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.operator.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          env:
            - name: RUST_LOG
              value: "info,netchecks_operator=debug"
            - name: OPERATOR_HTTP_ADDR
              value: "0.0.0.0:{{ .Values.operator.service.port }}"
            - name: PROBE_IMAGE_REPOSITORY
              value: {{ .Values.probeConfig.image.repository | quote }}
            - name: PROBE_IMAGE_TAG
              value: {{ .Values.probeConfig.image.tag | default .Chart.AppVersion | quote }}
            - name: PROBE_IMAGE_PULL_POLICY
              value: {{ .Values.probeConfig.image.pullPolicy | quote }}
      {{- with .Values.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
