apiVersion: v2
name: netchecks
description: Netchecks proactively verifies whether your security controls are working as intended.
type: application
icon: https://raw.githubusercontent.com/hardbyte/netchecks/main/.github/logo.png
# This is the chart version. This version number should be incremented each time you make changes
# to the chart and its templates, including the app version.
# Versions are expected to follow Semantic Versioning (https://semver.org/)
version: 0.2.1

# This is the version number of the application being deployed. This version number should be
# incremented each time you make changes to the application. Versions are not expected to
# follow Semantic Versioning. They should reflect the version the application is using.
# It is recommended to use it with quotes.
appVersion: "0.7.0"
sources:
  - https://github.com/hardbyte/netchecks
maintainers:
  - name: Brian Thorne
    email: brian@hardbyte.nz
    url: hardbyte.nz
annotations:
  # https://artifacthub.io/docs/topics/annotations/helm/
  artifacthub.io/changes: |
    - kind: changed
      description: Operator rewritten from Python/Kopf to Rust/kube-rs for lower resource usage and faster startup.
      links:
        - name: Pull Request
          url: https://github.com/hardbyte/netchecks/pull/317
    - kind: added
      description: TCP probe type for raw socket connectivity checks.
      links:
        - name: Pull Request
          url: https://github.com/hardbyte/netchecks/pull/315
    - kind: added
      description: Status conditions on NetworkAssertion — reconciliation status visible via kubectl describe.
    - kind: added
      description: Controller watches CronJob changes for event-driven scheduled assertion processing.
    - kind: changed
      description: Distroless container image (chainguard/static) replaces python:3.12 for the operator.
    - kind: added
      description: Structured JSON logging with optional OTLP metrics export.
    - kind: added
      description: Health endpoints at /livez and /readyz.
    - kind: fixed
      description: PolicyReport server-side apply compatibility with v1alpha2 CRD schema.
    - kind: fixed
      description: Multi-platform Docker build cache isolation for arm64/amd64.
  artifacthub.io/category: security
  artifacthub.io/operator: "true"
  artifacthub.io/prerelease: "false"
  artifacthub.io/operatorCapabilities: Deep Insights
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Documentation
      url: https://docs.netchecks.io
  artifacthub.io/crds: |
    - kind: NetworkAssertion
      version: v1
      name: networkassertions.netchecks.io
      displayName: Network Assertion
      description: NetworkAssertion is the Schema for the networkassertions API
  artifacthub.io/crdsExamples: |
    - apiVersion: netchecks.io/v1
      kind: NetworkAssertion
      metadata:
        name: http-should-work
        annotations:
          description: Assert pod can connect to k8s API
      spec:
        template:
          metadata:
            labels:
              optional-label: applied-to-test-pod
            annotations:
              my: override-annotation
        rules:
          - name: kubernetes-version
            type: http
            url: https://kubernetes.default.svc/version
            verify-tls-cert: false
            expected: pass
            validate:
              message: Http request to Kubernetes API should succeed.
dependencies:
  - name: policy-reporter
    version: 2.22.4
    repository: https://kyverno.github.io/policy-reporter
    condition: policy-reporter.enabled
